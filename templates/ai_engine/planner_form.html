{% extends 'base2.html' %}
{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="card-stat p-12 bg-white shadow-2xl rounded-[40px] border border-emerald-50">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-emerald-50 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-sm">
                <i class="fas fa-globe-asia text-3xl text-emerald-700"></i>
            </div>
            <h3 class="text-3xl font-black text-emerald-900 tracking-tighter uppercase">AI National Planner</h3>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-[0.2em] mt-2">Intelligent All-India Travel Logic</p>
        </div>

        <form method="POST" class="grid md:grid-cols-2 gap-8">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest block ml-2">Target State</label>
                <input type="text" name="state" required placeholder="Kerala, Rajasthan, etc." 
                    class="w-full p-4 bg-gray-50 border-none rounded-2xl font-bold text-emerald-900 outline-none focus:ring-2 focus:ring-emerald-500">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest block ml-2">Travel Days</label>
                <input type="number" name="days" min="1" max="10" value="3" 
                    class="w-full p-4 bg-gray-50 border-none rounded-2xl font-bold text-emerald-900 outline-none focus:ring-2 focus:ring-emerald-500">
            </div>

            <div class="md:col-span-2 space-y-2">
                <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest block ml-2">City/Region Preference (Optional)</label>
                <input type="text" name="city" placeholder="Munnar, Jaipur, Ranchi..." 
                    class="w-full p-4 bg-gray-50 border-none rounded-2xl font-bold text-emerald-900 outline-none focus:ring-2 focus:ring-emerald-500">
            </div>

            <div class="md:col-span-2">
                <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest block mb-4 ml-2">Travel Interest</label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="category" value="ECO" class="peer sr-only" checked>
                        <div class="p-5 text-center border-2 border-gray-100 rounded-2xl peer-checked:border-emerald-600 peer-checked:bg-emerald-50 transition-all font-bold text-xs text-gray-500 peer-checked:text-emerald-900 flex flex-col gap-2">
                            <i class="fas fa-leaf text-lg"></i> Eco-Tourism
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="category" value="CULTURAL" class="peer sr-only">
                        <div class="p-5 text-center border-2 border-gray-100 rounded-2xl peer-checked:border-emerald-600 peer-checked:bg-emerald-50 transition-all font-bold text-xs text-gray-500 peer-checked:text-emerald-900 flex flex-col gap-2">
                            <i class="fa-solid fa-landmark fa-2x"></i> Cultural Heritage
                        </div>
                    </label>
                </div>
            </div>

            <button type="submit" class="md:col-span-2 bg-emerald-800 text-white w-full py-5 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-emerald-700 transition shadow-xl">
                Generate Smart Itinerary <i class="fas fa-wand-magic-sparkles ml-2"></i>
            </button>
        </form>
    </div>
</div>
{% endblock %}
